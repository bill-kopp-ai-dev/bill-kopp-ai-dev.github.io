site_name: Bill Kopp | AI Engineer
site_url: https://bill-kopp-ai-dev.github.io/
site_description: Portfolio de Engenharia de IA, Agentic AI e MLOps
site_author: Bill Kopp

theme:
  name: material
  palette:
    scheme: slate
    primary: teal
    accent: green
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
  extra_css:
    - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Percival.OS: projects/percival.md
  - Open CLI Agents: projects/open-cli-agents.md
  - MCP Servers: projects/mcp-servers.md
  - Multimodal GenAI: projects/multimodal-genai.md
  - Sci Computing: projects/simulation-software.md
  - Philosophy: career/philosophy.md
  - Biotech: career/biotech.md
